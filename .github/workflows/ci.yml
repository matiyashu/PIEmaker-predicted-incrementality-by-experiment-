name: CI

# Full V.4 CI: backend pytest suite + frontend type/build check.
# Pairs with formula-contracts.yml which is the strict gate on pie_formulas.
# This workflow is the broad gate — any failure blocks merge.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # demo_seed test trains a real RF on 400 RCTs + runs 6 hold-outs +
      # scores 50 portfolio rows — single test, ~7 minutes. We split it into
      # its own pytest invocation with a generous timeout so CI fails fast on
      # quick-test regressions but still validates the full pipeline on PR.

      - name: Pytest — fast suite
        run: |
          python -m pytest tests/ -q --tb=short --ignore=tests/test_demo_seed.py

      - name: Pytest — demo seed (full pipeline smoke)
        run: |
          python -m pytest tests/test_demo_seed.py -q --tb=short
        timeout-minutes: 15

  frontend:
    name: Frontend (build + types)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (also runs Next type-check)
        run: npm run build

  e2e:
    name: Frontend e2e (Playwright smoke in demo mode)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: npx playwright test
        env:
          CI: "1"
          NEXT_PUBLIC_FORCE_DEMO: "1"
