<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#f8fafc"/>

  <!-- header -->
  <text x="40" y="38" font-family="ui-sans-serif,system-ui" font-size="9" fill="#64748b">PHASE 4 · DECISION SIMULATOR</text>
  <text x="40" y="62" font-family="ui-sans-serif,system-ui" font-size="20" font-weight="700" fill="#0f172a">Reallocate the budget</text>

  <!-- summary card -->
  <rect x="40" y="80" width="720" height="60" rx="8" fill="#dbeafe" stroke="#bfdbfe"/>
  <rect x="52" y="92" width="22" height="22" rx="4" fill="#bfdbfe"/>
  <text x="84" y="103" font-family="ui-sans-serif,system-ui" font-size="11" font-weight="600" fill="#1e3a8a">What you're seeing</text>
  <text x="84" y="119" font-family="ui-sans-serif,system-ui" font-size="9" fill="#1e40af">A what-if budget reallocation: total spend stays constant, money</text>
  <text x="84" y="131" font-family="ui-sans-serif,system-ui" font-size="9" fill="#1e40af">shifts toward campaigns with higher risk-adjusted ICPD.</text>

  <!-- metric cards -->
  <g font-family="ui-sans-serif,system-ui">
    <rect x="40" y="160" width="170" height="60" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="52" y="176" font-size="8" fill="#64748b">ORIGINAL IC TOTAL</text>
    <text x="52" y="200" font-size="18" font-weight="700" fill="#0f172a">12,485</text>

    <rect x="220" y="160" width="170" height="60" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="232" y="176" font-size="8" fill="#64748b">PROJECTED IC TOTAL</text>
    <text x="232" y="200" font-size="18" font-weight="700" fill="#0f172a">13,538</text>

    <rect x="400" y="160" width="170" height="60" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="412" y="176" font-size="8" fill="#64748b">INCREMENTAL LIFT</text>
    <text x="412" y="200" font-size="18" font-weight="700" fill="#10b981">+8.43%</text>

    <rect x="580" y="160" width="180" height="60" rx="6" fill="white" stroke="#e2e8f0"/>
    <text x="592" y="176" font-size="8" fill="#64748b">ACTIVE MODEL</text>
    <text x="592" y="200" font-size="11" font-weight="600" fill="#0f172a">v-mock01 · production</text>
  </g>

  <!-- before/after bar chart -->
  <rect x="40" y="240" width="720" height="100" rx="6" fill="white" stroke="#e2e8f0"/>
  <text x="52" y="258" font-family="ui-sans-serif,system-ui" font-size="11" font-weight="600" fill="#0f172a">Original vs proposed spend</text>

  <!-- bars (paired) -->
  <g transform="translate(60,275)">
    <g>
      <rect x="0"   y="30" width="14" height="30" fill="#94a3b8"/>
      <rect x="16"  y="20" width="14" height="40" fill="#3b82f6"/>
      <rect x="40"  y="40" width="14" height="20" fill="#94a3b8"/>
      <rect x="56"  y="50" width="14" height="10" fill="#3b82f6"/>
      <rect x="80"  y="20" width="14" height="40" fill="#94a3b8"/>
      <rect x="96"  y="10" width="14" height="50" fill="#3b82f6"/>
      <rect x="120" y="35" width="14" height="25" fill="#94a3b8"/>
      <rect x="136" y="30" width="14" height="30" fill="#3b82f6"/>
      <rect x="160" y="15" width="14" height="45" fill="#94a3b8"/>
      <rect x="176" y="5"  width="14" height="55" fill="#3b82f6"/>
      <rect x="200" y="40" width="14" height="20" fill="#94a3b8"/>
      <rect x="216" y="48" width="14" height="12" fill="#3b82f6"/>
      <rect x="240" y="22" width="14" height="38" fill="#94a3b8"/>
      <rect x="256" y="14" width="14" height="46" fill="#3b82f6"/>
      <rect x="280" y="32" width="14" height="28" fill="#94a3b8"/>
      <rect x="296" y="42" width="14" height="18" fill="#3b82f6"/>
      <rect x="320" y="18" width="14" height="42" fill="#94a3b8"/>
      <rect x="336" y="8"  width="14" height="52" fill="#3b82f6"/>
      <rect x="360" y="40" width="14" height="20" fill="#94a3b8"/>
      <rect x="376" y="35" width="14" height="25" fill="#3b82f6"/>
      <rect x="400" y="25" width="14" height="35" fill="#94a3b8"/>
      <rect x="416" y="15" width="14" height="45" fill="#3b82f6"/>
      <rect x="440" y="38" width="14" height="22" fill="#94a3b8"/>
      <rect x="456" y="28" width="14" height="32" fill="#3b82f6"/>
      <rect x="480" y="14" width="14" height="46" fill="#94a3b8"/>
      <rect x="496" y="4"  width="14" height="56" fill="#3b82f6"/>
      <rect x="520" y="42" width="14" height="18" fill="#94a3b8"/>
      <rect x="536" y="50" width="14" height="10" fill="#3b82f6"/>
      <rect x="560" y="20" width="14" height="40" fill="#94a3b8"/>
      <rect x="576" y="14" width="14" height="46" fill="#3b82f6"/>
      <rect x="600" y="35" width="14" height="25" fill="#94a3b8"/>
      <rect x="616" y="28" width="14" height="32" fill="#3b82f6"/>
    </g>
  </g>
  <!-- legend -->
  <g font-family="ui-sans-serif,system-ui" font-size="8">
    <rect x="650" y="252" width="10" height="8" fill="#94a3b8"/>
    <text x="664" y="259" fill="#475569">original</text>
    <rect x="700" y="252" width="10" height="8" fill="#3b82f6"/>
    <text x="714" y="259" fill="#475569">proposed</text>
  </g>
